<!DOCTYPE html>
<html>
<head>
<title>Employee Salary Management</title>

<style>
body {
    font-family: Arial;
    background-color: #e6e6e6;
}

.box {
    width: 420px;
    margin: 50px auto;
    padding: 20px;
    background: white;
    border: 2px solid black;
}

h2 {
    text-align: center;
}

label {
    display: inline-block;
    width: 150px;
}

input {
    width: 200px;
    padding: 5px;
    margin: 5px 0;
}

button {
    margin-left: 150px;
    padding: 8px 15px;
}

.output {
    margin-top: 15px;
    border-top: 1px solid black;
    padding-top: 10px;
}
</style>

</head>

<body>

<div class="box">
<h2>Employee Salary Management</h2>

<label>Employee Name:</label>
<input type="text" id="name"><br>

<label>Employee ID:</label>
<input type="text" id="id"><br>

<label>Branch:</label>
<input type="text" id="branch"><br>

<label>Basic Salary:</label>
<input type="number" id="salary"><br>

<button onclick="calculate()">Calculate Salary</button>

<div class="output" id="result"></div>

</div>

<script>
function calculate(){

let name = document.getElementById("name").value;
let id = document.getElementById("id").value;
let branch = document.getElementById("branch").value;
let basic = parseFloat(document.getElementById("salary").value);

if(name=="" || id=="" || branch=="" || isNaN(basic)){
    alert("Please fill all fields correctly!");
    return;
}

// Salary Calculation
let hra = basic * 0.20;
let da = basic * 0.10;
let total = basic + hra + da;

// Display Output
document.getElementById("result").innerHTML = `
    <h3>Employee Details</h3>
    Name: ${name} <br>
    ID: ${id} <br>
    Branch: ${branch} <br><br>

    <h3>Salary Details</h3>
    Basic Salary: ${basic} <br>
    HRA (20%): ${hra} <br>
    DA (10%): ${da} <br>
    <b>Total Salary: ${total}</b>
`;
}
</script>

</body>
</html>
