<!DOCTYPE html>
<html lang="en">
<head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title> Conditional Statement in JS</title>
</head>
<body>
       <script>
              // conditional statement
              //JavaScript uses conditional statements to perform different actions based on different conditions, controlling the flow of a program. 
              // if condition...

              // age validation for vote  casting.

              let age=23;
              if(age>=18){
                    console.log(age + " is valid for vote casting");
              } 
               
              //if ..else....

              let myAge=20;
              if(myAge<18){
                    console.log("not valid age");
              }
              else{
                    console.log("valid age");
              }

              // Switch case...
              let grade= 'A';
              switch(grade){
                    case 'A': result="First Division";
                    break;

                    case 'B': result="Second Division";
                    break;

                    case 'C': result="Third Division";
                    break;
                    default:result="Fail";
              }
              console.log(result);


              //if else if else ....
              let marks=80;
              if(marks>=60){
                    console.log("First grade");
              }
              else if(marks<60 && marks>=40){
                    console.log("Second grade");
              }
              else if(marks<40  && marks>=33){
                    console.log("Third Grade");
              }
              else{
                    console.log("Fail");
              }

              
       </script>             
</body>
</html>
