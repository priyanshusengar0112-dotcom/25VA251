<!DOCTYPE html>
<html lang="en">
<head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>javascript</title>
</head>
<body>
       <script>
                    // js is case sensitive
           //js variables...contains either value or not...
           // variable declaration
           var myName="priyanshu";  // global
           document.write(myName);
           console.log(myName);
           
           function demo(){
                    var msg="Hello World";  //local
                    console.log(msg);
           }
           demo();
           //variable declaration using let and const
           let myNumber=1234567898;  
           console.log(myNumber);
           const myEmail="priyanshusengar0112@gmail.com";
           console.log(myEmail);
           
       </script>             
</body>
</html>
