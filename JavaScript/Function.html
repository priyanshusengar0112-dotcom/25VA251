       <script>
          // function is defined to perform a specific task.             
         // types of function 
         // normal function : - with para, without parameters and with default paramaters

         // nomral function without parameters...

         function demo(){
             console.log("Hello JS");
         }
         demo();  // function calling
         

         // with parameteres 
         function demo1(text){
               console.log("hello "+text);
         }
         demo1("React");

         //default parameter
         function add(a,b=12){     // last one ko default value dete hai
                 console.log("Addition is "+(a+b));
         }
         add(4);

         //Synchronous Functions (Blocking): Executes tasks one after the other in a strict, sequential order. The program waits for the current function to complete and return a value before moving to the next line of code.
          // Synchronous
         function cal(){
              function mul(x,y){
                    console.log(x*y);
              }
              function sub(p,r){
                    console.log(p-r);
              }
               mul(2,4);
               sub(8,4);
         }
         cal();

         //Anonymous function --> they are defined without the name

         let msg=function(){
                    console.log("Hello to ABES");
                    // console.log(typeof(msg));
         }
         msg();
         // short code for above function
         let msg1=()=> console.log("Hello ABESSSS ECCCCC");
         msg1();
         
         // arrow function using multiple lines
         let msg2=(a,b)=>{
                    var num1=a;
                    var num2=b;
                    var res=num1/num2;
                    console.log("Result is "+res);
         }
         msg2(10,20);

         // IIFE :- 

         (function(){
                    console.log("Hello World");
         })();
         // short code for above function
         (msg=>console.log("Hello Priyanshu"))();

      let num=[2,3,5,7,7,8,1,0];

      //map
      let square=num.map(n=>n*n);
      console.log(square);
      // reduce()
      let sum=num.reduce((total,n)=>total+n);
      console.log(sum);
      //filter
      let sorting=num.filter(n=>n>2);
      console.log(sorting);
      //forEach
