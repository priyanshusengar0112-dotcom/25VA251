<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Result Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            margin-top: 50px;
        }

        .container {
            width: 350px;
            margin: auto;
            padding: 20px;
            border: 2px solid black;
            background-color: white;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            padding: 5px;
            margin: 10px;
            width: 80px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }

        .result {
            margin-top: 15px;
            text-align: left;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Student Result Calculator</h2>

    <label>Enter Number of Subjects:</label><br>
    <input type="number" id="subjects" value="3"><br>

    <button onclick="calculateResult()">Calculate Result</button>

    <div class="result" id="output"></div>
</div>

<script>
function calculateResult() {
    let n = document.getElementById("subjects").value;
    let total = 0;

    // Loop to take marks input
    for (let i = 1; i <= n; i++) {
        let marks = prompt("Enter marks for subject " + i + ":");

        if (marks === null || marks === "" || isNaN(marks)) {
            alert("Invalid input! Please enter numeric value.");
            return;
        }

        total += parseFloat(marks);
    }

    let average = total / n;
    let grade = "";
    let result = "";

    // Conditions for grade
    if (average >= 75) {
        grade = "A";
    } else if (average >= 60) {
        grade = "B";
    } else if (average >= 50) {
        grade = "C";
    } else {
        grade = "F";
    }

    // Pass/Fail condition
    if (average >= 50) {
        result = "PASS";
    } else {
        result = "FAIL";
    }

    // Display output
    document.getElementById("output").innerHTML = `
        <p>Total Marks: ${total}</p>
        <p>Average Marks: ${average.toFixed(2)}</p>
        <p>Grade: ${grade}</p>
        <p>Result: ${result}</p>
    `;
}
</script>

</body>
</html>
