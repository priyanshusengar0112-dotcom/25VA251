<!DOCTYPE html>
<html lang="en">
<head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>Datavalue types in Js</title>
</head>
<body>
      <script>
             //Js Data value types
             // Primitive , immutable , single value datatype in js 
             // string ,number, boolean , undefined , null , Bigint and symbol
             
             // string 
             var myName="priyanshu sengar";
             console.log(myName);
             //number
             var myMob=8585829452;
             console.log(myMob);
             //boolean
             var isMarried=false;
             console.log(myName +" is married? :" + isMarried);
             //null
             var myAddress=null;
             console.log(myAddress);
             console.log(typeof(myAddress));

//              var myNum=Bigint(8423592685757267);
//              console.log(myNum);
//              console.log(typeof(myNum));

//              // symbol 
//              var var1="priyanshu";
//              var var2="priyanshu";
//              console.log(var1==var2);  // gives true value 

                var var1=Symbol("priyanshu");
                var var2=Symbol("priyanshu");
                console.log(var1==var2);    // give false value
                // Reference Type(object) -- mutable is memory and keep the data in key value pair
                // object {} , function(), array[]
                let myInfo={
                    name:"priyanshu", 
                    age:19, 
                    isMarried:false, 
                    address: "Ghaziabad 24", 
                    branch:"CSE", 
                    section:23
                };
                console.log(myInfo);

                // object length
                var keys=Object.keys(myInfo);
                console.log(keys,length);

                // Function -- block of code to perform specific task.

                function cal(){
                    var num1=45;
                    var num2=40;
                    var add=num1+num2;
                    console.log("Addition of two numbers is " + add);
                }
                cal();     // function call

                // Array -- collection of any datatypes.
                let studentList=["stu1","stu2","stu3","stu4"];
                console.log(studentList[0]);
                // for different data types
                let stu1=["priyanshu", 23, false, "GZB" , "CSE", null, 18];
                console.log(stu1);
                console.log(stu1.length);

                // to iterate array number
                for(let i=0;i<stu1.length;i++){
                    console.log(stu1[i]);
                }
                for(let x in stu1){
                    console.log("updated way " + stu1[x]);
                }
      </script>              

</body>
</html>
